<!DOCTYPE html>

Read ME:

I started with a basic HTML structure for the game map. 
I linked two CSS files: one for the specific styles of level one 
and another for general game map styles. The body contains a div 
with the id "game" where the game will be rendered, 
and I included a script tag to link the JavaScript file that will handle 
the game logic for level one. 

there is also a basic walls and fills that we can easly change depending
 on the theme and level.
-->

    <link rel="stylesheet" href="src/css/level_one_styles.css">
    <link rel="stylesheet" href="src/css/game_map_styles.css">
</head>
<body>

<div id="game"></div>

<script src="src/js/level_one_script.js"></script>
</body>
</html>
